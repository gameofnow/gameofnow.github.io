<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game of Now</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; background-color: #990033; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;

      padding: 3rem 2rem;
      min-height: 100vh;

    .links { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }
    .signal-link { font-size: 1rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #ffffff; text-decoration: none; border-bottom: 1px solid #ffffff; padding-bottom: 2px; }
    .download-link { font-size: 0.95rem; font-style: italic; color: #ffd6e0; text-decoration: none; }
