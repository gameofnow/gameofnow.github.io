<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Game Øf Now</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="shortcut icon" href="../favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #111111;
      --soft-ink: rgba(17, 17, 17, 0.55);
      --wine: #990033;
      --paper: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      width: 100%;
      background: var(--paper);
      font-family: "Cormorant Garamond", "EB Garamond", Georgia, serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .logo {
      position: absolute;
      top: 36px;
      left: 56px;
      width: 70px;
      height: 70px;
      z-index: 5;
    }

    .lang-switcher {
      position: fixed;
      top: 44px;
      right: 56px;
      display: flex;
      gap: 16px;
      font-family: "Space Grotesk", "Inter", -apple-system, sans-serif;
      font-size: 13px;
      letter-spacing: 0.15em;
      z-index: 10;
    }
    .lang-switcher a {
      color: rgba(17, 17, 17, 0.55);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 180ms ease;
    }
    .lang-switcher a:hover { color: var(--wine); }
    .lang-switcher a.current {
      color: var(--ink);
      font-weight: 700;
    }

    @media (max-width: 600px) {
      .lang-switcher {
        top: 28px;
        right: 24px;
        font-size: 11px;
        gap: 12px;
      }
    }

    .bg-mark {
      position: fixed;
      top: 50%;
      right: -650px;
      transform: translateY(-50%);
      width: 1600px;
      height: 1600px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
      user-select: none;
    }

    .bg-mark img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .page,
    .logo {
      position: relative;
      z-index: 1;
    }

    .logo {
      position: absolute;
      z-index: 5;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 60fr 40fr;
      padding: 140px 56px 64px;
      gap: 48px;
      align-items: center;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 720px;
    }

    .title {
      font-size: clamp(34px, 6vw, 88px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.005em;
      margin-bottom: 0.7em;
      white-space: nowrap;
    }

    .prefix {
      font-size: clamp(22px, 2.6vw, 36px);
      color: var(--soft-ink);
      letter-spacing: 0.01em;
      margin-bottom: 0.4em;
      font-weight: 400;
    }

    .rotating {
      font-size: clamp(40px, 5vw, 72px);
      font-style: italic;
      color: var(--wine);
      font-weight: 500;
      line-height: 1.15;
      min-height: 1.4em;
    }

    .rotating.prompt {
      color: var(--soft-ink);
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 0.18em;
      text-decoration-thickness: 1.5px;
    }
    .rotating.prompt:hover {
      color: var(--wine);
    }

    .invite {
      margin-top: 1.6em;
      font-size: 16px;
      color: var(--soft-ink);
      letter-spacing: 0.02em;
    }
    .invite a {
      color: var(--wine);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.2em;
    }
    .invite a:hover {
      color: #000000;
    }

    .cursor {
      display: inline-block;
      font-style: normal;
      color: var(--wine);
      margin-left: 0.05em;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cta {
      display: inline-block;
      font-family: "Space Grotesk", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(30px, 3.6vw, 48px);
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: clamp(26px, 3vw, 36px) clamp(64px, 7vw, 104px);
      background: linear-gradient(135deg, #6E0023 0%, #E91E63 100%);
      color: #ffffff;
      border: 4px solid #000000;
      border-radius: 999px;
      text-decoration: none;
      cursor: pointer;
      transition: background 220ms ease, color 220ms ease, transform 180ms ease, box-shadow 180ms ease;
      animation: ctaBreath 1.8s ease-in-out infinite;
      will-change: transform, box-shadow;
    }

    @keyframes ctaBreath {
      0%, 100% {
        transform: scale(1) translateY(0);
        box-shadow: 6px 8px 6px rgba(0, 0, 0, 0.55);
      }
      50% {
        transform: scale(1.05) translateY(-4px);
        box-shadow: 10px 14px 10px rgba(0, 0, 0, 0.6);
      }
    }

    .cta:hover, .cta:focus {
      background: linear-gradient(135deg, #ffffff 0%, #ffffff 100%);
      color: var(--wine);
      animation-play-state: paused;
      transform: scale(1.07) translateY(-8px);
      box-shadow: 14px 18px 14px rgba(0, 0, 0, 0.65);
      outline: none;
    }

    @media (max-width: 820px) {
      .page {
        grid-template-columns: 1fr;
        padding: 120px 28px 48px;
        gap: 56px;
      }
      .logo { width: 56px; height: 56px; top: 24px; left: 28px; }
      .left { max-width: none; }
      .right { padding: 16px 0 32px; }
      .bg-mark {
        width: 900px;
        height: 900px;
        right: -260px;
        opacity: 0.04;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cta { animation: none; }
      .cursor { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg-mark" aria-hidden="true">
    <img src="../ring-logo.png" alt="">
  </div>

  <img src="../ring-logo.png" alt="The Game Øf Now" class="logo">

  <nav class="lang-switcher" aria-label="Idioma">
    <a href="../index.html">ENG</a>
    <a href="index.html" class="current">CAT</a>
    <a href="../esp/index.html">ESP</a>
  </nav>

  <main class="page">
    <div class="left">
      <h1 class="title">The Game Øf Now</h1>
      <p class="prefix">És el moment de</p>
      <p class="rotating" id="rotating"><span id="phrase"></span><span class="cursor">|</span></p>
      <p class="invite">Envia&rsquo;m la teva → <a href="mailto:play@gameofnow.com?subject=La%20meva%20frase%20per%20a%20The%20Game%20%C3%98f%20Now&body=%C3%89s%20el%20moment%20de%20...%0A%0A">play@gameofnow.com</a></p>
    </div>

    <div class="right">
      <a href="booking.html" class="cta">ENTRA</a>
    </div>
  </main>

  <script>
    // Source: now-is-the-time-to.md (cat) — sync from there.
    const phrases = [
      "escoltar atentament",
      "jugar amb audàcia",
      "respirar conscientment",
      "perdonar apropiadament",
      "començar de nou",
      "posar-te del revés",
      "alçar la veu",
      "estimar obertament",
      "cooperar espontàniament",
      "deixar de beure",
      "prémer aquell botó d'allà!",
      "descansar plenament",
      "conèixer els teus veïns",
      "crear amb frescor",
      "notar clarament",
      "arribar a casa",
      "abraçar-te",
      "abraçar el teu fill",
      "netejar",
      "madurar",
      "aparèixer",
      "despertar",
      "treure les escombraries",
      "millorar les teves habilitats",
      "deixar anar suaument",
      "fer un pas endavant",
      "triar de manera diferent",
      "preguntar honestament",
      "tenir una rabieta",
      "deixar el maleït mòbil",
      "actuar senzillament",
      "caminar lentament",
      "parlar amb la teva mare",
      "riure amb el teu pare",
      "tallar la gespa",
      "veure clarament",
      "estar en silenci",
      "tornar a començar",
      "menjar les teves verdures",
      "despertar suaument",
      "mirar per sobre l'espatlla",
      "dir no a ja saps què",
      "escoltar dins",
      "confiar profundament",
      "jugar junts",
      "jurar que mai més ho faràs",
      "viure amb audàcia",
      "sentir-ho tot",
      "conèixer-te",
      "aparèixer plenament",
      "donar menjar al gat",
      "conspirar",
      "deixar el maleït mòbil"
    ];

    const PROMPT = "la teva frase aquí";
    const display = [];
    phrases.forEach((p, i) => {
      display.push(p);
      if ((i + 1) % 10 === 0) display.push(PROMPT);
    });

    const el = document.getElementById("phrase");
    const rotating = document.getElementById("rotating");
    let phraseIndex = 0;
    let charIndex = 0;
    let isDeleting = false;

    rotating.addEventListener("click", () => {
      if (display[phraseIndex] === PROMPT) {
        window.location.href = "mailto:play@gameofnow.com?subject=La%20meva%20frase%20per%20a%20The%20Game%20%C3%98f%20Now&body=%C3%89s%20el%20moment%20de%20...%0A%0A";
      }
    });

    function tick() {
      const current = display[phraseIndex];
      const isPrompt = current === PROMPT;
      rotating.classList.toggle("prompt", isPrompt);

      if (!isDeleting) {
        charIndex++;
        el.textContent = current.substring(0, charIndex);
        if (charIndex === current.length) {
          setTimeout(() => { isDeleting = true; tick(); }, isPrompt ? 4200 : 2200);
          return;
        }
      } else {
        charIndex--;
        el.textContent = current.substring(0, charIndex);
        if (charIndex === 0) {
          isDeleting = false;
          phraseIndex = (phraseIndex + 1) % display.length;
          setTimeout(tick, 400);
          return;
        }
      }

      setTimeout(tick, isDeleting ? 28 : 65);
    }

    tick();
  </script>
</body>
</html>
